/* Overlay for readability */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background: linear-gradient(
    160deg,
    rgba(6,8,20,0.78) 0%,
    rgba(10,14,30,0.68) 40%,
    rgba(6,8,20,0.82) 100%
  );
}
/* Glassmorphism card base */
.glass {
  background: var(--bg-1);
  backdrop-filter: var(--glass);
  -webkit-backdrop-filter: var(--glass);
  border: var(--glass-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
}
input, textarea, select, button { font-family: inherit; }
button { cursor: pointer; border: none; outline: none; }
a { color: var(--accent-h); text-decoration: none; }
img { max-width: 100%; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-1); }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }

/* ============================================================
   LAYOUT
   ============================================================ */
#app { display: flex; min-height: 100vh; }

/* Sidebar */
#sidebar {
  width: 240px;
  min-width: 240px;
  background: rgba(10,12,20,0.82);
  backdrop-filter: var(--glass);
  -webkit-backdrop-filter: var(--glass);
  border-right: var(--glass-border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}
#sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
#sidebar-logo h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-h), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -.5px;
}
#sidebar-logo p { font-size: 11px; color: var(--text-2); margin-top: 2px; }
#sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 12px 10px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-1);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  margin-bottom: 2px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.nav-item:hover { background: var(--bg-3); color: var(--text-0); }
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent-h);
  border: 1px solid rgba(99,102,241,.25);
}
.nav-item .icon { font-size: 16px; min-width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
}
#sidebar-footer {
  padding: 12px 10px;
  border-top: 1px solid var(--border);
}
.user-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-2);
}
.user-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-info p { font-size: 12px; font-weight: 600; }
.user-info span { font-size: 10px; color: var(--text-2); }

/* Main */
#main {
  flex: 1;
  margin-left: 240px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
#topbar {
  background: rgba(10,12,20,0.7);
  backdrop-filter: var(--glass);
  -webkit-backdrop-filter: var(--glass);
  border-bottom: var(--glass-border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
#topbar h2 { font-size: 18px; font-weight: 700; flex: 1; }
#topbar-actions { display: flex; gap: 8px; align-items: center; }
#content { flex: 1; padding: 28px; max-width: 1200px; }
#hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text-0);
  font-size: 20px;
  cursor: pointer;
}

/* Overlay */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 90;
}
#overlay.active { display: block; }

/* ============================================================
   COMPONENTS
   ============================================================ */
/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,.4); }
.btn-secondary {
  background: var(--bg-3);
  color: var(--text-0);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-2); border-color: var(--accent); }
.btn-ghost { background: none; color: var(--text-1); padding: 8px 12px; }
.btn-ghost:hover { color: var(--text-0); background: var(--bg-2); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: .85; }
.btn-success { background: var(--green); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: .45; pointer-events: none; }

/* Cards */
.card {
  background: var(--bg-1);
  backdrop-filter: var(--glass);
  -webkit-backdrop-filter: var(--glass);
  border: var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
}
.card-sub { font-size: 13px; color: var(--text-2); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; }
.form-control {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text-0);
  font-size: 14px;
  transition: border-color var(--transition);
}
.form-control:focus { outline: none; border-color: var(--accent); }
.form-control::placeholder { color: var(--text-2); }
select.form-control { appearance: none; cursor: pointer; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
@media (max-width: 900px) {
  .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}

/* Stat card */
.stat-card {
  background: var(--bg-1);
  backdrop-filter: var(--glass);
  -webkit-backdrop-filter: var(--glass);
  border: var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.stat-card.accent::before { background: var(--accent); }
.stat-card.green::before { background: var(--green); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.cyan::before { background: var(--cyan); }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--text-2); font-weight: 600; }
.stat-value { font-size: 28px; font-weight: 800; }
.stat-meta { font-size: 12px; color: var(--text-2); }

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-accent { background: var(--accent-dim); color: var(--accent-h); }
.badge-green { background: rgba(34,197,94,.15); color: var(--green); }
.badge-yellow { background: rgba(245,158,11,.15); color: var(--yellow); }
.badge-red { background: rgba(239,68,68,.15); color: var(--red); }
.badge-cyan { background: rgba(6,182,212,.15); color: var(--cyan); }

/* Tags */
.tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg-3);
  color: var(--text-1);
}

/* Alert */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin-bottom: 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.alert-info { background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.25); color: var(--accent-h); }
.alert-success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: var(--green); }
.alert-warning { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.25); color: var(--yellow); }
.alert-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); color: var(--red); }

/* Progress */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg-3);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .4s ease;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.tab-btn {
  flex: 1;
  min-width: 80px;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  background: none;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
}
.tab-btn.active {
  background: var(--bg-1);
  color: var(--text-0);
  box-shadow: var(--shadow);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: rgba(12,15,25,0.92);
  backdrop-filter: var(--glass);
  -webkit-backdrop-filter: var(--glass);
  border: var(--glass-border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 580px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,0.07);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal-header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text-2); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--text-0); }
.modal-body { padding: 20px; }
.modal-footer { padding: 0 20px 20px; display: flex; justify-content: flex-end; gap: 10px; }

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.upload-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
}
.upload-icon { font-size: 40px; margin-bottom: 12px; }
.upload-zone p { color: var(--text-1); font-size: 14px; }
.upload-zone span { font-size: 12px; color: var(--text-2); }

/* Toast */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn .25s ease;
  max-width: 320px;
}
@keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
.toast.fadeout { animation: toastOut .25s ease forwards; }
@keyframes toastOut { to { opacity:0; transform:translateX(20px); } }
.toast-success { border-left: 3px solid var(--green); }
.toast-error { border-left: 3px solid var(--red); }
.toast-info { border-left: 3px solid var(--accent); }

/* Loader */
.loader {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--bg-3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 60px 20px;
  color: var(--text-2);
  font-size: 14px;
}
.loading-block .loader { width: 32px; height: 32px; border-width: 3px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-2);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 14px; }
.empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-1); margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 16px; font-weight: 700; }

/* ============================================================
   MODULE: DASHBOARD
   ============================================================ */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-top: 20px;
}
.qa-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}
.qa-card:hover { border-color: var(--accent); background: var(--accent-dim); transform: translateY(-2px); }
.qa-card .qa-icon { font-size: 28px; margin-bottom: 10px; }
.qa-card .qa-title { font-size: 13px; font-weight: 600; }
.qa-card .qa-sub { font-size: 11px; color: var(--text-2); margin-top: 4px; }
.upcoming-list { display: flex; flex-direction: column; gap: 8px; }
.upcoming-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.upcoming-date {
  min-width: 44px;
  text-align: center;
  background: var(--bg-3);
  border-radius: var(--radius-sm);
  padding: 6px 4px;
}
.upcoming-date .day { font-size: 18px; font-weight: 800; line-height: 1; }
.upcoming-date .mon { font-size: 10px; color: var(--text-2); text-transform: uppercase; }
.upcoming-info { flex: 1; }
.upcoming-info p { font-size: 13px; font-weight: 600; }
.upcoming-info span { font-size: 11px; color: var(--text-2); }

/* ============================================================
   MODULE: EXAMS
   ============================================================ */
.exam-config {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 680px) { .exam-config { grid-template-columns: 1fr; } }
.type-check-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.type-check {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--bg-3);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all var(--transition);
}
.type-check input { display: none; }
.type-check.checked { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-h); }

/* Quiz */
#quiz-container { display: none; }
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
#timer-display {
  font-size: 24px;
  font-weight: 800;
  font-family: var(--mono);
  color: var(--text-0);
}
#timer-display.warning { color: var(--yellow); }
#timer-display.danger { color: var(--red); animation: pulse .5s infinite; }
@keyframes pulse { 50% { opacity: .6; } }
.question-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}
.question-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.question-num { font-size: 12px; color: var(--text-2); font-weight: 600; }
.question-type-badge { }
.question-text { font-size: 15px; font-weight: 600; margin-bottom: 16px; line-height: 1.5; }
.options-list { display: flex; flex-direction: column; gap: 8px; }
.option-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 14px;
}
.option-item:hover { border-color: var(--accent); background: var(--accent-dim); }
.option-item.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent-h); }
.option-item.correct { border-color: var(--green); background: rgba(34,197,94,.1); color: var(--green); }
.option-item.wrong { border-color: var(--red); background: rgba(239,68,68,.1); color: var(--red); }
.option-letter {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--bg-3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.tf-options { display: flex; gap: 12px; }
.tf-btn {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-sm);
  background: var(--bg-2);
  border: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  color: var(--text-0);
}
.tf-btn:hover { border-color: var(--accent); }
.tf-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent-h); }
.tf-btn.correct { border-color: var(--green); background: rgba(34,197,94,.1); color: var(--green); }
.tf-btn.wrong { border-color: var(--red); background: rgba(239,68,68,.1); color: var(--red); }
.fill-input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  color: var(--text-0);
  font-size: 14px;
  transition: border-color var(--transition);
}
.fill-input:focus { outline: none; border-color: var(--accent); }
.fill-input.correct { border-color: var(--green); }
.fill-input.wrong { border-color: var(--red); }
.question-feedback {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
}
.feedback-correct { background: rgba(34,197,94,.1); color: var(--green); }
.feedback-wrong { background: rgba(239,68,68,.1); color: var(--red); }
.quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; flex-wrap: wrap; gap: 10px; }

/* Results */
.results-header { text-align: center; padding: 30px 0; }
.score-circle {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: conic-gradient(var(--accent) 0%, var(--bg-3) 0%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  position: relative;
}
.score-circle::before {
  content: '';
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  background: var(--bg-1);
}
.score-inner { position: relative; z-index: 1; text-align: center; }
.score-pct { font-size: 26px; font-weight: 800; }
.score-lbl { font-size: 11px; color: var(--text-2); }
.results-breakdown { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
.rb-item { text-align: center; padding: 12px 20px; background: var(--bg-2); border-radius: var(--radius-sm); }
.rb-item .val { font-size: 22px; font-weight: 800; }
.rb-item .lbl { font-size: 11px; color: var(--text-2); margin-top: 4px; }

/* History */
.exam-history-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.ehi-score {
  font-size: 20px;
  font-weight: 800;
  min-width: 54px;
  text-align: center;
}
.ehi-info { flex: 1; }
.ehi-info p { font-size: 13px; font-weight: 600; }
.ehi-info span { font-size: 11px; color: var(--text-2); }

/* ============================================================
   MODULE: SUMMARY
   ============================================================ */
.summary-result {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.summary-section {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}
.summary-section h4 {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent-h);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.summary-section p, .summary-section li { font-size: 14px; color: var(--text-1); line-height: 1.7; }
.summary-section ul { padding-left: 18px; display: flex; flex-direction: column; gap: 6px; }
.concept-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.concept-tag {
  padding: 5px 12px;
  background: var(--accent-dim);
  border: 1px solid rgba(99,102,241,.25);
  border-radius: 20px;
  font-size: 12px;
  color: var(--accent-h);
  font-weight: 500;
}

/* ============================================================
   MODULE: FLASHCARDS
   ============================================================ */
.flashcard-area {
  perspective: 1200px;
  margin-bottom: 24px;
}
.flashcard {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  height: 260px;
  position: relative;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute;
  inset: 0;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  backface-visibility: hidden;
  text-align: center;
}
.flashcard-face.back {
  transform: rotateY(180deg);
  border-color: var(--accent);
}
.flashcard-label {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-2);
}

    if (data.idToken) {

    document.getElementById('user-status').textContent = 'Offline';
    console.warn('Firebase auth failed, using local mode', e);
  }
}

async function fbGet(path) {
  if (!state.uid) return null;
  try {
    const url = `${CONFIG.FIREBASE_DB_URL}/users/${state.uid}/${path}.json?auth=${state.fbToken}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function fbSet(path, data) {
  if (!state.uid) return;
  try {
    const url = `${CONFIG.FIREBASE_DB_URL}/users/${state.uid}/${path}.json?auth=${state.fbToken}`;
    await fetch(url, { method: 'PUT', body: JSON.stringify(data) });
  } catch (e) { console.warn('FB set failed', e); }
  // Always save to localStorage as backup
  localStorage.setItem('sai_' + path.replace(/\//g, '_'), JSON.stringify(data));
}

async function fbPush(path, data) {
  if (!state.uid) {
    // Local fallback
    const key = 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    const existing = JSON.parse(localStorage.getItem('sai_' + path.replace(/\//g, '_')) || '{}');
    existing[key] = data;
    localStorage.setItem('sai_' + path.replace(/\//g, '_'), JSON.stringify(existing));
    return key;
  }
  try {
    const url = `${CONFIG.FIREBASE_DB_URL}/users/${state.uid}/${path}.json?auth=${state.fbToken}`;
    const res = await fetch(url, { method: 'POST', body: JSON.stringify(data) });
    const j = await res.json();
    // Backup
    const existing = JSON.parse(localStorage.getItem('sai_' + path.replace(/\//g, '_')) || '{}');
    existing[j.name] = data;
    localStorage.setItem('sai_' + path.replace(/\//g, '_'), JSON.stringify(existing));
    return j.name;
  } catch (e) {
    console.warn('FB push failed', e);
    return null;
  }
}

/* ============================================================
   PDF EXTRACTION
   ============================================================ */
async function extractPDFText(file) {
  // Cargar pdf.js si no está disponible
  if (!window.pdfjsLib) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const arrayBuffer = e.target.result;
        const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const pageText = content.items.map(item => item.str).join(' ');
          fullText += pageText + '\n';
        }
        fullText = fullText.replace(/\s+/g, ' ').trim();
        if (fullText.length < 30) throw new Error('No se pudo extraer texto del PDF. Puede ser un PDF escaneado sin capa de texto.');
        resolve(fullText.slice(0, 30000));
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

}

function setupDragDrop(zoneId, inputId) {
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) {
      const inp = document.getElementById(inputId);
      const dt = new DataTransfer();
      dt.items.add(f);
      inp.files = dt.files;
      inp.dispatchEvent(new Event('change'));
    }
  });
}

async function handleExamFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('exam-file-info').classList.add('hidden');
  try {
    showToast('Extrayendo texto del PDF…', 'info');
    const text = await extractPDFText(file);
    state.pdfText = text;
    state.pdfName = file.name;
    document.getElementById('exam-file-name').textContent = file.name;
    document.getElementById('exam-file-chars').textContent = `${text.length.toLocaleString()} caracteres extraídos`;
    document.getElementById('exam-file-info').classList.remove('hidden');
    showToast('PDF procesado correctamente', 'success');
  } catch (e) {
    showToast('Error al procesar el PDF: ' + e.message, 'error');
  }
}

function toggleTypeCheck(el) {
  el.classList.toggle('checked');
  const cb = el.querySelector('input');
  cb.checked = el.classList.contains('checked');
  el.firstChild.textContent = el.classList.contains('checked') ? ' ✔ ' : ' ';
  const labelText = el.textContent.trim().replace(/^✔\s*/, '');
  el.innerHTML = `<input type="checkbox" value="${cb.value}" ${cb.checked ? 'checked' : ''}>${cb.checked ? ' ✔ ' : ' '}${labelText}`;
}

function getSelectedTypes() {
  const checks = document.querySelectorAll('.type-check input:checked');
  if (checks.length === 0) return ['multiple', 'tf'];
  return Array.from(checks).map(c => c.value);
}

async function generateExam() {
  const text = state.pdfText || document.getElementById('exam-text-input')?.value.trim();
  if (!text || text.length < 50) {
    showToast('Por favor subí un PDF o pegá texto para generar el examen', 'warning');
    return;
  }

  const qty = parseInt(document.getElementById('exam-qty').value) || 10;
  const timeVal = parseInt(document.getElementById('exam-time-val')?.value) || 0;
  const timeUnit = document.getElementById('exam-time-unit')?.value || 'min';
  const timeMin = timeUnit === 'hrs' ? timeVal * 60 : timeVal;

  const difficultyEl = document.getElementById('exam-difficulty');
  let difficulty = difficultyEl ? difficultyEl.value : 'Media';
  if (difficulty === 'Personalizada') {
    const custom = document.getElementById('exam-diff-custom')?.value.trim();
    if (custom) difficulty = custom;
    else difficulty = 'Media';
  }

  const subjectId = document.getElementById('exam-subject').value;
  const customInst = document.getElementById('exam-custom-inst')?.value.trim() || '';

  // Get selected types from chips
  const typeChips = document.querySelectorAll('.exam-type-chip.selected');
  const types = typeChips.length > 0 ? Array.from(typeChips).map(c => c.dataset.value) : ['multiple', 'tf'];

  const typeLabels = {
    multiple: 'opción múltiple (4 opciones A/B/C/D, una correcta)',
    tf: 'verdadero o falso',
    fill: 'completar el espacio en blanco (respuesta corta)',
    oneword: 'respuesta de exactamente una palabra',
    twoword: 'respuesta de exactamente dos palabras',
    short: 'desarrollo corto (2-3 oraciones)',
    long: 'desarrollo largo (párrafo completo)',
    relate: 'relacionar conceptos de la columna A con la columna B',
    order: 'ordenar los conceptos en el orden correcto',
    clinical: 'caso clínico con pregunta de análisis',
    practical: 'caso práctico de aplicación',
  };
  const typesStr = types.map(t => typeLabels[t] || t).join(', ');

  state.examConfig = { qty, timeMin, difficulty, subjectId, pdfName: state.pdfName || 'Texto pegado', types, customInst };

  document.getElementById('btn-generate-exam').disabled = true;
  document.getElementById('exam-loading').classList.remove('hidden');
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('exam-results').classList.add('hidden');

  const prompt = `Sos un profesor universitario experto. Generá exactamente ${qty} preguntas basándote EXCLUSIVAMENTE en el material proporcionado.

CONFIGURACIÓN DEL EXAMEN:
- Cantidad de preguntas: ${qty}
- Tiempo de evaluación: ${timeMin > 0 ? (timeMin >= 60 ? Math.floor(timeMin/60) + 'h ' + (timeMin%60 > 0 ? timeMin%60+'min' : '') : timeMin + ' minutos') : 'Sin límite'}
- Nivel de dificultad: ${difficulty}
- Tipos de pregunta (distribuir equilibradamente entre todos): ${typesStr}
${customInst ? `- Instrucción especial del usuario: ${customInst}` : ''}

Respondé ÚNICAMENTE con un JSON válido. Sin texto adicional antes ni después. Sin markdown.

Formato:
[
  {"type":"multiple","question":"¿...?","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A"},
  {"type":"tf","question":"Afirmación...","answer":"Verdadero"},
  {"type":"fill","question":"El ___ es...","answer":"respuesta"},
  {"type":"oneword","question":"¿Qué término...?","answer":"término"},
  {"type":"twoword","question":"¿Cómo se llama...?","answer":"dos palabras"},
  {"type":"short","question":"Explicá brevemente...","answer":"respuesta esperada resumida"},
  {"type":"long","question":"Desarrollá...","answer":"respuesta esperada resumida"},
  {"type":"relate","question":"Relacioná: A) concepto1 B) concepto2 → 1) def1 2) def2","answer":"A-1, B-2"},
  {"type":"order","question":"Ordená: A, B, C, D","answer":"B, D, A, C"},
  {"type":"clinical","question":"Paciente de 30 años...","answer":"diagnóstico/tratamiento"},
  {"type":"practical","question":"Dado el caso...","answer":"respuesta esperada"}
]

MATERIAL DE ESTUDIO:
${text.slice(0, 14000)}`;

  try {
    const raw = await callAI(prompt);
    let json = raw;
    json = json.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
    const start = json.indexOf('[');
    const end = json.lastIndexOf(']');
    if (start !== -1 && end !== -1) json = json.slice(start, end + 1);

    const questions = JSON.parse(json);
    if (!Array.isArray(questions) || questions.length === 0) throw new Error('Sin preguntas');

    state.examQuestions = questions;
    state.examAnswers = {};
    state.examRevealed = {};
    state.currentQ = 0;
    state.examStartTime = Date.now();

    document.getElementById('exam-loading').classList.add('hidden');
    document.getElementById('btn-generate-exam').disabled = false;
    document.getElementById('quiz-container').style.display = 'block';
    document.getElementById('exam-results').classList.add('hidden');

    if (timeMin > 0) {
      state.examTimeLeft = timeMin * 60;
      startExamTimer();
    } else {
      document.getElementById('timer-display').textContent = '∞';
    }

    renderQuestion(0);
    showToast(`Examen generado: ${questions.length} preguntas`, 'success');
  } catch (e) {
    document.getElementById('exam-loading').classList.add('hidden');
    document.getElementById('btn-generate-exam').disabled = false;
    showToast('Error al generar el examen: ' + e.message, 'error');
    console.error(e);
  }
}

function renderQuestion(idx) {
  const q = state.examQuestions[idx];
  if (!q) return;
  state.currentQ = idx;
  const total = state.examQuestions.length;

  document.getElementById('quiz-title').textContent = state.examConfig.pdfName || 'Examen';
  document.getElementById('quiz-progress-text').textContent = `Pregunta ${idx + 1} de ${total}`;
  document.getElementById('quiz-progress-bar').style.width = `${((idx + 1) / total) * 100}%`;
  document.getElementById('quiz-q-counter').textContent = `${idx + 1} / ${total}`;

  const revealed = state.examRevealed[idx];
  const userAns = state.examAnswers[idx];

  let inputHtml = '';
  const typeLabel = {
    multiple: 'Opción Múltiple', tf: 'Verdadero/Falso', fill: 'Completar',
    oneword: 'Una Palabra', twoword: 'Dos Palabras', short: 'Desarrollo Corto',
    long: 'Desarrollo Largo', relate: 'Relacionar', order: 'Ordenar',
    clinical: 'Caso Clínico', practical: 'Caso Práctico',
  };
  const typeBadgeColor = {
    multiple: 'badge-accent', tf: 'badge-cyan', fill: 'badge-yellow',
    oneword: 'badge-green', twoword: 'badge-green', short: 'badge-accent',
    long: 'badge-accent', relate: 'badge-cyan', order: 'badge-yellow',
    clinical: 'badge-red', practical: 'badge-yellow',
  };

  if (q.type === 'multiple' && q.options) {
    inputHtml = `<div class="options-list">` +
      q.options.map((opt, i) => {
        let cls = 'option-item';
        if (revealed) {
          const letter = String.fromCharCode(65 + i);
          if (opt.startsWith(letter + ')') && (q.answer === letter || q.answer === opt || q.answer.startsWith(letter))) {
            cls += ' correct';
          } else if (userAns === letter && userAns !== q.answer && !q.answer.startsWith(userAns)) {
            cls += ' wrong';
          }
        } else if (userAns === String.fromCharCode(65 + i)) {
          cls += ' selected';
        }
        const letter = String.fromCharCode(65 + i);
        return `<div class="${cls}" onclick="${revealed ? '' : `selectOption(${idx},'${letter}')`}">
          <span class="option-letter">${letter}</span> ${opt}
        </div>`;
      }).join('') + `</div>`;
  } else if (q.type === 'tf') {
    const isTrue = userAns === 'Verdadero';
    const isFalse = userAns === 'Falso';
    const correctIsTrue = q.answer === 'Verdadero' || q.answer === true || q.answer === 'True';
    inputHtml = `<div class="tf-options">
      <button class="tf-btn ${revealed ? (correctIsTrue ? 'correct' : (isTrue ? 'wrong' : '')) : (isTrue ? 'selected' : '')}"
        onclick="${revealed ? '' : `selectTF(${idx},'Verdadero')`}">✓ Verdadero</button>
      <button class="tf-btn ${revealed ? (!correctIsTrue ? 'correct' : (isFalse ? 'wrong' : '')) : (isFalse ? 'selected' : '')}"
        onclick="${revealed ? '' : `selectTF(${idx},'Falso')`}">✗ Falso</button>
    </div>`;
  } else {
    // All text-based types: fill, oneword, twoword, short, long, relate, order, clinical, practical
    const rows = (q.type === 'long' || q.type === 'short' || q.type === 'clinical' || q.type === 'practical') ? 4 : 1;
    const correctClass = revealed ? (userAns && userAns.toLowerCase().trim().includes(q.answer.toLowerCase().trim().slice(0,10)) ? 'correct' : 'wrong') : '';
    const tag = rows > 1 ? 'textarea' : 'input type="text"';
    const closeTag = rows > 1 ? '</textarea>' : '';
    if (rows > 1) {
      inputHtml = `<textarea class="fill-input ${correctClass}" id="fill-${idx}"
        rows="${rows}" ${revealed ? 'disabled' : ''}
        placeholder="Escribí tu respuesta…"
        oninput="state.examAnswers[${idx}]=this.value">${userAns || ''}</textarea>`;
    } else {
      inputHtml = `<input type="text" class="fill-input ${correctClass}" id="fill-${idx}"
        value="${userAns || ''}"
        ${revealed ? 'disabled' : ''}
        placeholder="Escribí tu respuesta…"
        oninput="state.examAnswers[${idx}]=this.value">`;
    }
  }

  let feedbackHtml = '';
  if (revealed) {
    const correct = isAnswerCorrect(idx);
    feedbackHtml = `<div class="question-feedback ${correct ? 'feedback-correct' : 'feedback-wrong'}">
      ${correct ? '✅ ¡Correcto!' : `❌ Incorrecto. La respuesta correcta es: <strong>${q.answer}</strong>`}
    </div>`;
  }

  document.getElementById('questions-container').innerHTML = `
    <div class="question-card">
      <div class="question-meta">
        <span class="question-num">Pregunta ${idx + 1}</span>
        <span class="badge ${typeBadgeColor[q.type] || 'badge-accent'}">${typeLabel[q.type] || q.type}</span>
      </div>
      <div class="question-text">${q.question}</div>
      ${inputHtml}
      ${feedbackHtml}
      ${!revealed
        ? `<button class="btn btn-secondary btn-sm mt-3" onclick="revealAnswer(${idx})">👁 Ver respuesta</button>`
        : ''}
    </div>
  `;

  // Prev/Next
  const prevBtn = document.getElementById('btn-prev-q');
  const nextBtn = document.getElementById('btn-next-q');
  const submitBar = document.getElementById('submit-bar');
  const nav = document.getElementById('quiz-nav');

  prevBtn.disabled = idx === 0;
  if (idx === total - 1) {
    nextBtn.classList.add('hidden');
    submitBar.classList.remove('hidden');
  } else {
    nextBtn.classList.remove('hidden');
    submitBar.classList.add('hidden');
  }
}

function selectOption(idx, letter) {
  state.examAnswers[idx] = letter;
  renderQuestion(idx);
}

function selectTF(idx, val) {
  state.examAnswers[idx] = val;
  renderQuestion(idx);
}

function revealAnswer(idx) {
  state.examRevealed[idx] = true;
  // For fill inputs, capture current value
  const fillEl = document.getElementById(`fill-${idx}`);
  if (fillEl) state.examAnswers[idx] = fillEl.value;
  renderQuestion(idx);
}

function isAnswerCorrect(idx) {
  const q = state.examQuestions[idx];
  const ans = state.examAnswers[idx];
  if (!q || ans === undefined || ans === null || ans === '') return false;

  if (q.type === 'multiple') {
    const correct = String(q.answer).trim().toUpperCase()[0];
    const given = String(ans).trim().toUpperCase()[0];
    return correct === given;
  }
  if (q.type === 'tf') {
    const correctBool = q.answer === 'Verdadero' || q.answer === true || q.answer === 'True';
    const givenBool = ans === 'Verdadero';
    return correctBool === givenBool;
  }
  // fill, oneword, twoword
  return String(ans).toLowerCase().trim() === String(q.answer).toLowerCase().trim();
}

function prevQuestion() {
  if (state.currentQ > 0) renderQuestion(state.currentQ - 1);
}

function nextQuestion() {
  if (state.currentQ < state.examQuestions.length - 1) renderQuestion(state.currentQ + 1);
}

function startExamTimer() {
  stopExamTimer();
  updateTimerDisplay();
  state.examTimer = setInterval(() => {
    state.examTimeLeft--;
    updateTimerDisplay();
    if (state.examTimeLeft <= 0) { finishExam(); }
  }, 1000);
}

function stopExamTimer() {
  if (state.examTimer) { clearInterval(state.examTimer); state.examTimer = null; }
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (!el) return;
  el.textContent = formatTime(state.examTimeLeft);
  el.className = 'timer-display';
  if (state.examTimeLeft < 300) el.classList.add('warning');
  if (state.examTimeLeft < 60) el.classList.add('danger');
}

async function finishExam() {
  stopExamTimer();

  // Reveal all
  state.examQuestions.forEach((_, i) => { state.examRevealed[i] = true; });

  const total = state.examQuestions.length;
  const correct = state.examQuestions.filter((_, i) => isAnswerCorrect(i)).length;
  const score = Math.round((correct / total) * 100);
  const elapsed = Math.round((Date.now() - (state.examStartTime || Date.now())) / 1000);

  // Save to history
  const record = {
    pdfName: state.examConfig.pdfName || 'Examen',
    subjectId: state.examConfig.subjectId || '',
    difficulty: state.examConfig.difficulty || 'Media',
    total, correct, score,
    timeSpent: elapsed,
    date: Date.now(),
  };

  const key = await fbPush('exam_history', record);
  state.examHistory.unshift({ id: key, ...record });

  // Update stats
  state.stats.examsCount = state.examHistory.length;
  state.stats.avgScore = Math.round(state.examHistory.reduce((s, e) => s + (e.score || 0), 0) / state.examHistory.length);
  state.stats.hoursStudied = (state.stats.hoursStudied || 0) + Math.round(elapsed / 3600 * 10) / 10;
  await fbSet('stats', state.stats);

  // Show results
  document.getElementById('quiz-container').style.display = 'none';
  const resultsEl = document.getElementById('exam-results');
  resultsEl.classList.remove('hidden');

  const deg = (score / 100) * 360;
  const color = score >= 70 ? 'var(--green)' : score >= 50 ? 'var(--yellow)' : 'var(--red)';

  // Build per-question review
  const reviewHtml = state.examQuestions.map((q, i) => {
    const ok = isAnswerCorrect(i);
    const ans = state.examAnswers[i] || '(sin respuesta)';
    return `
      <div class="question-card" style="margin-bottom:12px;border-left:3px solid ${ok ? 'var(--green)' : 'var(--red)'}">
        <div class="question-meta">
          <span class="question-num">Pregunta ${i + 1}</span>
          <span class="${ok ? 'color-green' : 'color-red'} fw-600">${ok ? '✅ Correcto' : '❌ Incorrecto'}</span>
        </div>
        <div class="question-text" style="font-size:14px">${q.question}</div>
        <div class="text-sm mt-1"><span class="text-muted">Tu respuesta:</span> <span class="fw-600">${ans}</span></div>
        ${!ok ? `<div class="text-sm mt-1"><span class="text-muted">Respuesta correcta:</span> <span class="fw-600 color-green">${q.answer}</span></div>` : ''}
      </div>`;
  }).join('');

  resultsEl.innerHTML = `
    <div class="results-header">
      <div class="score-circle" style="background:conic-gradient(${color} ${deg}deg, var(--bg-3) 0deg)">
        <div class="score-inner">
          <div class="score-pct" style="color:${color}">${score}%</div>
          <div class="score-lbl">Puntaje</div>
        </div>
      </div>
      <div style="font-size:22px;font-weight:800;margin-top:12px">
        ${score >= 70 ? '🎉 ¡Aprobado!' : score >= 50 ? '⚠️ Regular' : '😢 Reprobado'}
      </div>
      <div class="results-breakdown">
        <div class="rb-item">
          <div class="val color-green">${correct}</div>
          <div class="lbl">Correctas</div>
        </div>
        <div class="rb-item">
          <div class="val color-red">${total - correct}</div>
          <div class="lbl">Incorrectas</div>
        </div>
        <div class="rb-item">
          <div class="val">${total}</div>
          <div class="lbl">Total</div>
        </div>
        <div class="rb-item">
          <div class="val">${formatTime(elapsed)}</div>
          <div class="lbl">Tiempo</div>
        </div>
      </div>
    </div>
    <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
      <button class="btn btn-primary" onclick="generateExam()">🔄 Nuevo Examen</button>
      <button class="btn btn-secondary" onclick="switchTab('exam-tabs','tab-history',document.querySelector('[onclick*=tab-history]'))">📋 Ver Historial</button>
    </div>
    <div class="section-title mb-3">Revisión de Respuestas</div>
    ${reviewHtml}
  `;
  showToast(`Examen finalizado — ${score}%`, score >= 70 ? 'success' : 'warning');
}

async function generateSummary() {
  const text = state.pdfText || document.getElementById('sum-text-input')?.value.trim();
  if (!text || text.length < 30) { showToast('Necesitás subir un PDF o pegar texto', 'warning'); return; }

  const sumType = document.getElementById('sum-type').value;
  const subjectId = document.getElementById('sum-subject').value;

  document.getElementById('sum-loading').classList.remove('hidden');
  document.getElementById('sum-result').classList.add('hidden');

  const typePrompts = {
    all: `Generá en español:
1. RESUMEN CORTO (3-4 oraciones clave)
2. RESUMEN LARGO (párrafo detallado de 8-10 oraciones)
3. PUNTOS CLAVE (lista de 7-10 puntos importantes)
4. CONCEPTOS IMPORTANTES (lista de 8-12 términos o conceptos clave con breve definición)

Respondé SOLO con JSON (sin texto adicional):
{
  "short": "resumen corto aquí",
  "long": "resumen largo aquí",
  "keypoints": ["punto 1", "punto 2", ...],
  "concepts": ["concepto: definición", ...]
}`,
    short: `Generá un RESUMEN CORTO en español de 3-4 oraciones. Solo JSON: {"short": "..."}`,
    long: `Generá un RESUMEN LARGO y detallado en español de 10-12 oraciones. Solo JSON: {"long": "..."}`,
    keypoints: `Generá 8-10 PUNTOS CLAVE en español. Solo JSON: {"keypoints": ["punto 1", ...]}`,
    concepts: `Generá 10-15 CONCEPTOS IMPORTANTES con definición breve en español. Solo JSON: {"concepts": ["concepto: definición", ...]}`,
  };

  try {
    const raw = await callAI(`${typePrompts[sumType]}\n\nMATERIAL:\n${text.slice(0, 12000)}`);
    let json = raw.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
    const start = json.indexOf('{');
    const end = json.lastIndexOf('}');
    if (start !== -1 && end !== -1) json = json.slice(start, end + 1);

    const data = JSON.parse(json);

    // Save
    const record = { pdfName: state.pdfName || 'Material', subjectId, date: Date.now(), data };
    const key = await fbPush('summaries', record);
    state.summaries.unshift({ id: key, ...record });

    // Render
    document.getElementById('sum-loading').classList.add('hidden');
    renderSummaryData(data, 'sum-result');
    showToast('Resumen generado', 'success');
  } catch (e) {
    document.getElementById('sum-loading').classList.add('hidden');
    showToast('Error: ' + e.message, 'error');
    console.error(e);
  }
}

function renderSummaryData(data, containerId) {
  const el = document.getElementById(containerId);
  el.classList.remove('hidden');
  let html = '<div class="summary-result">';

  if (data.short) html += `
    <div class="summary-section">
      <h4>📌 Resumen Corto</h4>
      <p>${data.short}</p>
    </div>`;

  if (data.long) html += `
    <div class="summary-section">
      <h4>📖 Resumen Largo</h4>
      <p>${data.long}</p>
    </div>`;

  if (data.keypoints && data.keypoints.length > 0) html += `
    <div class="summary-section">
      <h4>🎯 Puntos Clave</h4>
      <ul>${data.keypoints.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>`;

  if (data.concepts && data.concepts.length > 0) html += `
    <div class="summary-section">
      <h4>💡 Conceptos Importantes</h4>
      <div class="concept-tags">${data.concepts.map(c => `<span class="concept-tag">${c}</span>`).join('')}</div>
    </div>`;

  html += '</div>';
  el.innerHTML = html;
}

async function generateFlashcards() {
  const text = state.pdfText || document.getElementById('fc-text-input')?.value.trim();
  if (!text || text.length < 30) { showToast('Necesitás subir un PDF o pegar texto', 'warning'); return; }

  const qty = document.getElementById('fc-qty').value;
  const focus = document.getElementById('fc-focus').value;

  document.getElementById('fc-loading').classList.remove('hidden');

  const prompt = `Generá exactamente ${qty} flashcards en español sobre el material. Enfoque: ${focus}.
Respondé SOLO con JSON válido:
[{"front": "pregunta o término", "back": "respuesta o definición"}, ...]

MATERIAL:
${text.slice(0, 12000)}`;

  try {
    const raw = await callAI(prompt);
    let json = raw.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
    const start = json.indexOf('[');
    const end = json.lastIndexOf(']');
    if (start !== -1 && end !== -1) json = json.slice(start, end + 1);

    const cards = JSON.parse(json);
    if (!Array.isArray(cards) || cards.length === 0) throw new Error('Sin tarjetas');

    const record = { pdfName: state.pdfName || 'Material', date: Date.now(), cards };
    const key = await fbPush('flashcard_sets', record);
    state.flashcardSets.unshift({ id: key, ...record });

    document.getElementById('fc-loading').classList.add('hidden');
    loadFlashcardSet(key);
    showToast(`${cards.length} flashcards generadas`, 'success');
  } catch (e) {
    document.getElementById('fc-loading').classList.add('hidden');
    showToast('Error: ' + e.message, 'error');
    console.error(e);
  }
}

function loadFlashcardSet(id) {
  const set = state.flashcardSets.find(s => s.id === id);
  if (!set || !set.cards) return;

  state.flashcards = set.cards;
  state.fcIndex = 0;
  state.fcKnown = new Array(set.cards.length).fill(null);
  state.fcFlipped = false;

  switchTab('fc-tabs', 'fc-study', document.querySelector('#fc-tabs .tab-btn:nth-child(2)'));
  renderFlashcardStudy();
}

function renderFlashcardStudy() {
  const cards = state.flashcards;
  const idx = state.fcIndex;
  const card = cards[idx];
  if (!card) return;

  const knownCount = state.fcKnown.filter(x => x === true).length;
  const unknownCount = state.fcKnown.filter(x => x === false).length;

  const dotsHtml = cards.map((_, i) => {
    let cls = 'fc-dot';
    if (i === idx) cls += ' current';
    else if (state.fcKnown[i] === true) cls += ' known';
    else if (state.fcKnown[i] === false) cls += ' unknown';
    return `<div class="${cls}"></div>`;
  }).join('');

  document.getElementById('fc-study-area').innerHTML = `
    <div style="max-width:620px;margin:0 auto">
      <div class="flex justify-between items-center mb-4" style="flex-wrap:wrap;gap:8px">
        <div class="fw-600 text-muted">${state.flashcards.length} tarjetas</div>
        <div class="flex gap-2">
          <span class="badge badge-green">✓ ${knownCount}</span>
          <span class="badge badge-red">✗ ${unknownCount}</span>
          <span class="badge badge-accent">? ${cards.length - knownCount - unknownCount}</span>
        </div>
      </div>

      <div class="flashcard-area" onclick="flipCard()">
        <div class="flashcard${state.fcFlipped ? ' flipped' : ''}" id="fc-card">
          <div class="flashcard-face front">
            <span class="flashcard-label">Pregunta</span>
            <div class="flashcard-text">${card.front}</div>
          </div>
          <div class="flashcard-face back">
            <span class="flashcard-label">Respuesta</span>
            <div class="flashcard-back-text">${card.back}</div>
          </div>
        </div>
      </div>

      <div class="text-center text-xs text-muted mb-4" style="margin-top:-8px">Hacé clic en la tarjeta para ver la respuesta</div>

      <div class="fc-dots">${dotsHtml}</div>

      <div class="flashcard-controls mt-4">
        <button class="btn btn-secondary" onclick="fcPrev()" ${idx === 0 ? 'disabled' : ''}>← Anterior</button>
        <span class="fc-progress">${idx + 1} / ${cards.length}</span>
        ${state.fcFlipped ? `
          <button class="btn btn-danger btn-sm" onclick="markFC(false)">✗ No lo sé</button>
          <button class="btn btn-success btn-sm" onclick="markFC(true)">✓ Lo sé</button>
        ` : ''}
        <button class="btn btn-secondary" onclick="fcNext()" ${idx === cards.length - 1 ? 'disabled' : ''}>Siguiente →</button>
      </div>

      ${state.fcKnown.every(x => x !== null) ? `
        <div class="alert alert-success mt-4" style="justify-content:center;flex-direction:column;text-align:center">
          <div class="fw-700 mb-2">¡Completaste el set! 🎉</div>
          <div class="text-sm">Sabías ${knownCount} de ${cards.length} tarjetas</div>
          <button class="btn btn-primary btn-sm mt-3" onclick="resetFC()">Repetir desde el principio</button>
        </div>` : ''}
    </div>
  `;
}

function flipCard() {
  state.fcFlipped = !state.fcFlipped;
  renderFlashcardStudy();
}

function fcNext() {
  if (state.fcIndex < state.flashcards.length - 1) {
    state.fcIndex++;
    state.fcFlipped = false;
    renderFlashcardStudy();
  }
}

function fcPrev() {
  if (state.fcIndex > 0) {
    state.fcIndex--;
    state.fcFlipped = false;
    renderFlashcardStudy();
  }
}

function markFC(known) {
  state.fcKnown[state.fcIndex] = known;
  state.fcFlipped = false;
  if (state.fcIndex < state.flashcards.length - 1) state.fcIndex++;
  renderFlashcardStudy();
}

function resetFC() {
  state.fcIndex = 0;
  state.fcKnown = new Array(state.flashcards.length).fill(null);
  state.fcFlipped = false;
  renderFlashcardStudy();
}

      </div>

  `;

}

function renderCalendar() {
  const y = state.calYear;
  const m = state.calMonth;
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-month-label').textContent = `${months[m]} ${y}`;

  const firstDay = (new Date(y, m, 1).getDay() + 6) % 7; // Monday first
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = new Date();

  const eventsByDay = {};
  state.events.forEach(ev => {
    if (!ev.date) return;
    const d = new Date(ev.date + 'T00:00:00');
    if (d.getFullYear() === y && d.getMonth() === m) {
      const day = d.getDate();
      if (!eventsByDay[day]) eventsByDay[day] = [];
      eventsByDay[day].push(ev);
    }
  });

  const days = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let html = `<div class="calendar-grid">
    ${days.map(d => `<div class="cal-header-cell">${d}</div>`).join('')}
    ${Array(firstDay).fill(0).map(() => `<div class="cal-cell empty"></div>`).join('')}
  `;

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = today.getFullYear() === y && today.getMonth() === m && today.getDate() === d;
    const evs = eventsByDay[d] || [];
    const evHtml = evs.slice(0, 3).map(ev => {
      const et = EVENT_TYPES[ev.type] || EVENT_TYPES.recordatorio;
      return `<div class="cal-event-dot" style="background:${et.bg};color:${et.color}">${ev.title}</div>`;
    }).join('');
    const more = evs.length > 3 ? `<div class="text-xs text-muted">+${evs.length - 3} más</div>` : '';

    html += `
      <div class="cal-cell${isToday ? ' today' : ''}" onclick="openAddEvent('${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}')">
        <div class="cal-day-num">${d}</div>
        <div class="cal-events">${evHtml}${more}</div>
      </div>`;
  }
  html += '</div>';
  document.getElementById('calendar-grid-container').innerHTML = html;
}

function renderWeekly() {
  const today = new Date();
  const startOfWeek = new Date(today);
  const day = (today.getDay() + 6) % 7;
  startOfWeek.setDate(today.getDate() - day);

  let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">`;
  for (let i = 0; i < 7; i++) {
    const d = new Date(startOfWeek);
    d.setDate(startOfWeek.getDate() + i);
    const isToday = d.toDateString() === today.toDateString();
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayEvs = state.events.filter(ev => ev.date === dateStr);
    const days = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

    html += `
      <div class="card" style="${isToday ? 'border-color:var(--accent)' : ''}">
        <div class="text-xs text-muted fw-600">${days[i]}</div>
        <div class="fw-700 mb-2" style="${isToday ? 'color:var(--accent-h)' : ''}">${d.getDate()}</div>
        ${dayEvs.map(ev => {
          const et = EVENT_TYPES[ev.type] || EVENT_TYPES.recordatorio;
          return `<div style="background:${et.bg};color:${et.color};padding:3px 6px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.title}</div>`;
        }).join('') || `<div class="text-xs text-muted">Sin eventos</div>`}
      </div>`;
  }
  html += '</div>';
  document.getElementById('weekly-view').innerHTML = html;
}

function renderEventsList() {
  const sorted = [...state.events].sort((a, b) => new Date(a.date) - new Date(b.date));
  if (sorted.length === 0) {
    document.getElementById('events-list').innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><h3>Sin eventos</h3><p>Agregá tu primer evento con el botón de arriba</p></div>';

  document.getElementById('events-list').innerHTML = sorted.map(ev => {
    const et = EVENT_TYPES[ev.type] || EVENT_TYPES.recordatorio;
    const sub = getSubjectById(ev.subjectId);
    const st = ev.status || 'pendiente';
    const sl = STATUS_LABELS[st] || STATUS_LABELS.pendiente;

    return `
      <div class="agenda-event-item">
        <div class="aei-color" style="background:${et.color}"></div>
        <div class="aei-info">

          ${ev.description ? `<div class="text-xs text-muted mt-1">${ev.description}</div>` : ''}
          <div class="aei-status">

function changeMonth(delta) {
  state.calMonth += delta;
  if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  renderCalendar();
}

function openAddEvent(date) {
  const today = date || new Date().toISOString().slice(0, 10);
  document.getElementById('ev-date').value = today;
  document.getElementById('ev-title').value = '';
  document.getElementById('ev-time').value = '';
  document.getElementById('ev-desc').value = '';
  document.getElementById('ev-type').value = 'parcial';

  // Update subject options
  const subOpts = state.subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  document.getElementById('ev-subject').innerHTML = `<option value="">Sin materia</option>${subOpts}`;

  openModal('modal-event');
}

async function saveEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const date = document.getElementById('ev-date').value;
  if (!title || !date) { showToast('Completá el título y la fecha', 'warning'); return; }

  const ev = {
    title,
    date,
    time: document.getElementById('ev-time').value,
    type: document.getElementById('ev-type').value,
    subjectId: document.getElementById('ev-subject').value,
    description: document.getElementById('ev-desc').value.trim(),
    status: 'pendiente',
    createdAt: Date.now(),
  };

  const key = await fbPush('events', ev);
  state.events.push({ id: key, ...ev });

  // Schedule notification if date is in the future
  scheduleNotification(ev);

  closeModal('modal-event');
  showToast('Evento guardado', 'success');

  // Re-render if on agenda page
  if (state.page === 'agenda') {
    renderCalendar();
    renderWeekly();
    renderEventsList();
  } else if (state.page === 'dashboard') {
    renderDashboard();
  }
}

async function deleteEvent(id) {
  if (!confirm('¿Eliminás este evento?')) return;
  await fbDelete(`events/${id}`);
  state.events = state.events.filter(e => e.id !== id);
  renderEventsList();
  renderCalendar();
  showToast('Evento eliminado', 'info');
}

async function changeEventStatus(id, status) {
  const idx = state.events.findIndex(e => e.id === id);
  if (idx === -1) return;
  state.events[idx].status = status;
  await fbSet(`events/${id}`, state.events[idx]);
  renderEventsList();
}

function scheduleNotification(ev) {
  if (!('Notification' in window)) return;
  const evDate = new Date(ev.date + 'T' + (ev.time || '08:00'));
  const diff = evDate.getTime() - Date.now() - 86400000; // 1 day before
  if (diff > 0 && diff < 7 * 86400000) {
    Notification.requestPermission().then(perm => {
      if (perm === 'granted') {
        setTimeout(() => {
          new Notification(`Recordatorio: ${ev.title}`, {
            body: `Mañana tenés: ${ev.title}`,
            icon: '📚',
          });
        }, diff);
      }
    });
  }
}

/* ============================================================
   PAGE: STATS
   ============================================================ */
function renderStats() {
  const hist = state.examHistory;
  const totalExams = hist.length;
  const avgScore = totalExams > 0
    ? Math.round(hist.reduce((s, e) => s + (e.score || 0), 0) / totalExams)
    : 0;
  const bestScore = totalExams > 0 ? Math.max(...hist.map(e => e.score || 0)) : 0;
  const approved = hist.filter(e => (e.score || 0) >= 70).length;

  // Scores by difficulty
  const byDiff = { Baja: [], Media: [], Alta: [] };
  hist.forEach(e => {
    const d = e.difficulty || 'Media';
    if (byDiff[d]) byDiff[d].push(e.score || 0);
  });

  // Scores by subject
  const bySub = {};
  hist.forEach(e => {
    if (e.subjectId) {
      if (!bySub[e.subjectId]) bySub[e.subjectId] = [];
      bySub[e.subjectId].push(e.score || 0);
    }
  });

  // Weekly activity (last 7 days)
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const weekData = Array(7).fill(0);
  const now = Date.now();
  hist.forEach(e => {
    const diff = Math.floor((now - (e.date || 0)) / 86400000);
    if (diff < 7) weekData[6 - diff]++;
  });

  function barChart(items, label, max) {
    if (items.length === 0) return '<div class="text-muted text-sm">Sin datos</div>';
    return items.map(([name, val, color]) => `
      <div class="bar-row">
        <div class="bar-label">${name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${max ? (val/max)*100 : val}%;background:${color || 'var(--accent)'}"></div></div>
        <div class="bar-val">${typeof val === 'number' && val % 1 === 0 ? val : val.toFixed(1)}${label || ''}</div>
      </div>`).join('');
  }

  const diffData = Object.entries(byDiff)
    .filter(([, v]) => v.length > 0)
    .map(([k, v]) => [k, Math.round(v.reduce((a,b)=>a+b,0)/v.length), '#6366f1']);

  const subData = Object.entries(bySub)
    .map(([id, scores]) => {
      const sub = getSubjectById(id);
      return [sub?.name || 'Sin materia', Math.round(scores.reduce((a,b)=>a+b,0)/scores.length), sub?.color || '#6366f1'];
    });

  const weekLabels = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    weekLabels.push(days[d.getDay()]);
  }
  const weekBarData = weekLabels.map((l, i) => [l, weekData[i], 'var(--cyan)']);
  const maxWeek = Math.max(...weekData, 1);

  document.getElementById('content').innerHTML = `
    <div class="grid-4 mb-5">
      <div class="stat-card accent">
        <div class="stat-label">Horas estudiadas</div>
        <div class="stat-value">${(state.stats.hoursStudied || 0).toFixed(1)}</div>
        <div class="stat-meta">Total acumulado</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Exámenes</div>
        <div class="stat-value">${totalExams}</div>
        <div class="stat-meta">Simulacros realizados</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-label">Promedio</div>
        <div class="stat-value">${avgScore}%</div>
        <div class="stat-meta">Puntaje promedio</div>
      </div>
      <div class="stat-card cyan">
        <div class="stat-label">Aprobados</div>
        <div class="stat-value">${totalExams > 0 ? Math.round((approved/totalExams)*100) : 0}%</div>
        <div class="stat-meta">${approved} de ${totalExams}</div>
      </div>
    </div>

    <div class="grid-2 mb-4">
      <div class="chart-container">
        <div class="chart-title">📊 Actividad semanal (exámenes)</div>
        <div class="bar-chart">
          ${barChart(weekBarData, '', maxWeek)}
        </div>
      </div>
      <div class="chart-container">
        <div class="chart-title">🎯 Promedio por dificultad</div>
        <div class="bar-chart">
          ${diffData.length > 0 ? barChart(diffData, '%', 100) : '<div class="text-muted text-sm">Sin datos suficientes</div>'}
        </div>
      </div>
    </div>

    ${subData.length > 0 ? `
    <div class="chart-container mb-4">
      <div class="chart-title">🎓 Promedio por materia</div>
      <div class="bar-chart">
        ${barChart(subData, '%', 100)}
      </div>
    </div>` : ''}

    <div class="card">
      <div class="card-title mb-4">🏆 Detalles de rendimiento</div>
      <div class="grid-3">
        <div style="text-align:center;padding:12px;background:var(--bg-2);border-radius:var(--radius-sm)">
          <div style="font-size:26px;font-weight:800;color:var(--green)">${bestScore}%</div>
          <div class="text-xs text-muted mt-1">Mejor puntaje</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--bg-2);border-radius:var(--radius-sm)">
          <div style="font-size:26px;font-weight:800;color:var(--accent-h)">${state.summaries.length}</div>
          <div class="text-xs text-muted mt-1">Resúmenes generados</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--bg-2);border-radius:var(--radius-sm)">
          <div style="font-size:26px;font-weight:800;color:var(--cyan)">${state.flashcardSets.length}</div>
          <div class="text-xs text-muted mt-1">Sets de flashcards</div>
        </div>
      </div>
    </div>
  `;
}

function switchTab(tabsId, panelId, btn) {
  const tabs = document.getElementById(tabsId);
  if (!tabs) return;
  tabs.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const panels = tabs.parentElement.querySelectorAll('.tab-panel');
  panels.forEach(p => {
    p.classList.toggle('active', p.id === panelId);
  });
}

function selectDifficulty(val, btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active','active-hard'));

function updateExamPreview() {
  const qty = document.getElementById('exam-qty')?.value || '?';
  const timeVal = document.getElementById('exam-time-val')?.value || '0';
  const timeUnit = document.getElementById('exam-time-unit')?.value || 'min';
  const diff = document.getElementById('exam-difficulty')?.value || '?';
  const chips = document.querySelectorAll('.exam-type-chip.selected');
  const typeNames = Array.from(chips).map(c => c.textContent.trim().replace(/^[^\w]*/, ''));
  const inst = document.getElementById('exam-custom-inst')?.value.trim() || '';

  const timeDisplay = parseInt(timeVal) === 0 ? 'Sin límite' : `${timeVal} ${timeUnit}`;

  const prevQty = document.getElementById('prev-qty');
  const prevTime = document.getElementById('prev-time');
  const prevDiff = document.getElementById('prev-diff');
  const prevTypes = document.getElementById('prev-types');
  const prevInstRow = document.getElementById('prev-inst-row');
  const prevInst = document.getElementById('prev-inst');

  if (prevQty) prevQty.textContent = qty;
  if (prevTime) prevTime.textContent = timeDisplay;
  if (prevDiff) prevDiff.textContent = diff;
  if (prevTypes) prevTypes.textContent = typeNames.length > 0 ? typeNames.join(', ') : 'Ninguno seleccionado';
  if (prevInstRow) prevInstRow.style.display = inst ? '' : 'none';
  if (prevInst) prevInst.textContent = inst.length > 60 ? inst.slice(0,60)+'…' : inst;
}

function saveExamConfig() {
  const name = prompt('Nombre para esta configuración (ej: Anatomía Parcial 1):');
  if (!name || !name.trim()) return;
  const config = {
    name: name.trim(),
    qty: document.getElementById('exam-qty')?.value || '10',
    timeVal: document.getElementById('exam-time-val')?.value || '30',
    timeUnit: document.getElementById('exam-time-unit')?.value || 'min',
    difficulty: document.getElementById('exam-difficulty')?.value || 'Media',
    customInst: document.getElementById('exam-custom-inst')?.value || '',
    types: Array.from(document.querySelectorAll('.exam-type-chip.selected')).map(c => c.dataset.value),
    id: 'ec_' + Date.now(),
  };
  if (!state.examSavedConfigs) state.examSavedConfigs = [];
  state.examSavedConfigs.unshift(config);
  localStorage.setItem('sai_exam_saved_configs', JSON.stringify(state.examSavedConfigs));
  fbSet('exam_saved_configs', state.examSavedConfigs);
  renderSavedConfigs();
  showToast('Configuración guardada: ' + config.name, 'success');
}

function renderSavedConfigs() {
  if (!state.examSavedConfigs || state.examSavedConfigs.length === 0) return;
  const container = document.getElementById('saved-configs-list');
  if (!container) return;
  container.innerHTML = state.examSavedConfigs.map(c => `
    <div class="saved-config-chip" onclick="loadExamConfig('${c.id}')">
      <span class="sc-name">${c.name}</span>
      <span class="sc-sub">${c.qty}p · ${c.timeVal}${c.timeUnit} · ${c.difficulty}</span>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteExamConfig('${c.id}')">✕</button>
    </div>`).join('');
}

function loadExamConfig(id) {
  const c = state.examSavedConfigs?.find(x => x.id === id);
  if (!c) return;
  const qtyEl = document.getElementById('exam-qty');
  if (qtyEl) qtyEl.value = c.qty;
  const tvEl = document.getElementById('exam-time-val');
  if (tvEl) tvEl.value = c.timeVal;
  const tuEl = document.getElementById('exam-time-unit');
  if (tuEl) tuEl.value = c.timeUnit;
  const diffEl = document.getElementById('exam-difficulty');
  if (diffEl) diffEl.value = c.difficulty;
  const ciEl = document.getElementById('exam-custom-inst');
  if (ciEl) ciEl.value = c.customInst || '';
  // Restore types
  document.querySelectorAll('.exam-type-chip').forEach(chip => {
    chip.classList.toggle('selected', c.types.includes(chip.dataset.value));
  });
  // Restore difficulty button
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active','active-hard'));
  document.querySelectorAll('.diff-btn').forEach(b => {
    if (b.textContent.includes(c.difficulty) || b.textContent.includes(c.difficulty.split(' ')[0])) {
      const hardLevels = ['Difícil','Muy difícil','Personalizada'];
      b.classList.add(hardLevels.includes(c.difficulty) ? 'active-hard' : 'active');
    }
  });
  if (c.difficulty === 'Personalizada') {
    document.getElementById('exam-diff-custom')?.classList.remove('hidden');
  }
  updateExamPreview();
  showToast('Configuración cargada: ' + c.name, 'info');
}

function deleteExamConfig(id) {
  state.examSavedConfigs = (state.examSavedConfigs || []).filter(x => x.id !== id);
  localStorage.setItem('sai_exam_saved_configs', JSON.stringify(state.examSavedConfigs));
  fbSet('exam_saved_configs', state.examSavedConfigs);
  renderSavedConfigs();
}
