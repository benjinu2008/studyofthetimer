/* --- Pomodoro logic --- */
function getWeekKey(d) {
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil((((d - jan1) / 86400000) + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function getMonthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function formatHrMin(secs) {
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m`;
  return `${Math.floor(secs)}s`;
}

function pomoSetSubject(id) {
  state.pomodoro.subjectId = id;
}

function pomoStart() {
  const p = state.pomodoro;
  if (p.timer) return;
  if (!p.timeLeft || p.timeLeft <= 0) pomoResetPhase();
  p.running = true;
  p.sessionStart = Date.now();
  document.getElementById('pomo-btn-start')?.style && (document.getElementById('pomo-btn-start').style.display='none');
  document.getElementById('pomo-btn-pause')?.style && (document.getElementById('pomo-btn-pause').style.display='');

  p.timer = setInterval(() => {
    p.timeLeft--;
    updatePomoDisplay();
    if (p.timeLeft <= 0) {
      clearInterval(p.timer);
      p.timer = null;
      pomoPhaseComplete();
    }
  }, 1000);
}

function pomoPause() {
  const p = state.pomodoro;
  if (p.timer) { clearInterval(p.timer); p.timer = null; }
  p.running = false;
  document.getElementById('pomo-btn-start')?.style && (document.getElementById('pomo-btn-start').style.display='');
  document.getElementById('pomo-btn-pause')?.style && (document.getElementById('pomo-btn-pause').style.display='none');
}

function pomoReset() {
  const p = state.pomodoro;
  if (p.timer) { clearInterval(p.timer); p.timer = null; }
  p.running = false;
  pomoResetPhase();
  updatePomoDisplay();
  document.getElementById('pomo-btn-start')?.style && (document.getElementById('pomo-btn-start').style.display='');
  document.getElementById('pomo-btn-pause')?.style && (document.getElementById('pomo-btn-pause').style.display='none');
}

function pomoSkip() {
  const p = state.pomodoro;
  if (p.timer) { clearInterval(p.timer); p.timer = null; }
  p.running = false;
  pomoAdvancePhase();
  renderPomodoro();
}

function pomoResetPhase() {
  const p = state.pomodoro;
  if (p.phase === 'study') p.timeLeft = p.studyMin * 60;
  else if (p.phase === 'short-break') p.timeLeft = p.shortBreakMin * 60;
  else p.timeLeft = p.longBreakMin * 60;
  p.totalTime = p.timeLeft;
}

function pomoAdvancePhase() {
  const p = state.pomodoro;
  if (p.phase === 'study') {
    p.currentCycle++;
    if (p.currentCycle % p.cyclesBeforeLong === 0) {
      p.phase = 'long-break';
      p.timeLeft = p.longBreakMin * 60;
    } else {
      p.phase = 'short-break';
      p.timeLeft = p.shortBreakMin * 60;
    }
  } else {
    p.phase = 'study';
    p.timeLeft = p.studyMin * 60;
  }
  p.totalTime = p.timeLeft;
}

async function pomoPhaseComplete() {
  const p = state.pomodoro;
  const elapsed = p.sessionStart ? Math.round((Date.now() - p.sessionStart) / 1000) : 0;

  // Record session
  const sub = getSubjectById(p.subjectId);
  const session = {
    type: p.phase,
    durationSecs: elapsed,
    subjectId: p.subjectId || '',
    subjectName: sub?.name || '',
    date: Date.now(),
  };
  p.sessionHistory.push(session);

  if (p.phase === 'study') {
    p.completedPomodoros++;
    p.totalStudySeconds = (p.totalStudySeconds || 0) + elapsed;
    if (p.subjectId) {
      p.subjectStudyTime[p.subjectId] = (p.subjectStudyTime[p.subjectId] || 0) + elapsed;
    }
    // Weekly/monthly
    const wk = getWeekKey(new Date());
    const mo = getMonthKey(new Date());
    p.weeklyTime[wk] = (p.weeklyTime[wk] || 0) + elapsed;
    p.monthlyTime[mo] = (p.monthlyTime[mo] || 0) + elapsed;

    // Update global stats
    state.stats.hoursStudied = ((state.stats.hoursStudied || 0) + elapsed / 3600);
    await fbSet('stats', state.stats);
    showToast('🍅 ¡Pomodoro completado! Tiempo de descanso.', 'success');
  } else {
    showToast('☕ Descanso terminado. ¡A estudiar!', 'info');
  }

  await pomoSaveState();

  // Notify
  if ('Notification' in window && Notification.permission === 'granted') {
    const msg = p.phase === 'study' ? '¡Pomodoro completado! Tomá un descanso.' : '¡Descanso terminado! Volvé a estudiar.';
    new Notification('StudyAI — Pomodoro', { body: msg, icon: '🍅' });
  }

  pomoAdvancePhase();
  if (state.page === 'pomodoro') renderPomodoro();
}

async function pomoSaveState() {
  const p = state.pomodoro;
  const toSave = {
    studyMin: p.studyMin, shortBreakMin: p.shortBreakMin, longBreakMin: p.longBreakMin,
    cyclesBeforeLong: p.cyclesBeforeLong, currentCycle: p.currentCycle, phase: p.phase,
    completedPomodoros: p.completedPomodoros, sessionHistory: p.sessionHistory.slice(-100),
    subjectId: p.subjectId, subjectStudyTime: p.subjectStudyTime,
    weeklyTime: p.weeklyTime, monthlyTime: p.monthlyTime,
    totalStudySeconds: p.totalStudySeconds, savedConfigs: p.savedConfigs,
  };
  await fbSet('pomodoro', toSave);
  localStorage.setItem('sai_pomodoro', JSON.stringify(toSave));
}

function updatePomoDisplay() {
  const p = state.pomodoro;
  const timeEl = document.getElementById('pomo-time');
  if (timeEl) timeEl.textContent = formatTime(Math.max(0, p.timeLeft));
  updatePomoRing();
}

function updatePomoRing() {
  const p = state.pomodoro;
  const ring = document.getElementById('pomo-ring');
  if (!ring) return;
  const CIRC = 2 * Math.PI * 105;
  const progress = p.totalTime > 0 ? (p.timeLeft / p.totalTime) : 1;
  ring.style.strokeDasharray = CIRC;
  ring.style.strokeDashoffset = CIRC * (1 - progress);
  ring.className = 'pomo-ring-fill ' + p.phase;
}

function pomoUpdateConfig() {
  const study = parseInt(document.getElementById('cfg-study')?.value) || 25;
  const short = parseInt(document.getElementById('cfg-short')?.value) || 5;
  const long = parseInt(document.getElementById('cfg-long')?.value) || 15;
  const cycles = parseInt(document.getElementById('cfg-cycles')?.value) || 4;
  const prev = document.getElementById('cfg-preview-text');
  if (prev) prev.textContent = `Configuración: ${study}/${short}/${long} min · ${cycles} ciclos`;
}

function pomoApplyConfig() {
  const p = state.pomodoro;
  p.studyMin = parseInt(document.getElementById('cfg-study')?.value) || 25;
  p.shortBreakMin = parseInt(document.getElementById('cfg-short')?.value) || 5;
  p.longBreakMin = parseInt(document.getElementById('cfg-long')?.value) || 15;
  p.cyclesBeforeLong = parseInt(document.getElementById('cfg-cycles')?.value) || 4;
  p.phase = 'study';
  p.currentCycle = 0;
  pomoResetPhase();
  pomoSaveState();
  showToast('Configuración aplicada ✅', 'success');
  navigate('pomodoro');
}

function pomoSaveConfig() {
  const name = prompt('Nombre para esta configuración (ej: Anatomía Parcial 1):');
  if (!name || !name.trim()) return;
  const p = state.pomodoro;
  const cfg = {
    id: 'pc_' + Date.now(),
    name: name.trim(),
    studyMin: parseInt(document.getElementById('cfg-study')?.value) || p.studyMin,
    shortBreakMin: parseInt(document.getElementById('cfg-short')?.value) || p.shortBreakMin,
    longBreakMin: parseInt(document.getElementById('cfg-long')?.value) || p.longBreakMin,
    cyclesBeforeLong: parseInt(document.getElementById('cfg-cycles')?.value) || p.cyclesBeforeLong,
  };
  p.savedConfigs.unshift(cfg);
  pomoSaveState();
  showToast('Configuración guardada: ' + cfg.name, 'success');
  renderPomodoro();
  switchTab('pomo-tabs','pomo-config',document.querySelector('[onclick*="pomo-config"]'));
}

function pomoLoadConfig(id) {
  const p = state.pomodoro;
  const cfg = p.savedConfigs.find(c => c.id === id);
  if (!cfg) return;
  document.getElementById('cfg-study').value = cfg.studyMin;
  document.getElementById('cfg-short').value = cfg.shortBreakMin;
  document.getElementById('cfg-long').value = cfg.longBreakMin;
  document.getElementById('cfg-cycles').value = cfg.cyclesBeforeLong;
  pomoUpdateConfig();
  showToast('Configuración cargada: ' + cfg.name, 'info');
}

function pomoDeleteConfig(id) {
  state.pomodoro.savedConfigs = state.pomodoro.savedConfigs.filter(c => c.id !== id);
  pomoSaveState();
  const el = document.getElementById('pomo-saved-configs');
  if (el) {
    const p = state.pomodoro;
    el.innerHTML = p.savedConfigs.length === 0
      ? '<div class="text-sm text-muted">Sin configuraciones guardadas.</div>'
      : p.savedConfigs.map(c => `
          <div class="pomo-saved-config" onclick="pomoLoadConfig('${c.id}')">
            <div><div class="name">${c.name}</div><div class="times">${c.studyMin}/${c.shortBreakMin}/${c.longBreakMin} min · ${c.cyclesBeforeLong} ciclos</div></div>
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();pomoDeleteConfig('${c.id}')">✕</button>
          </div>`).join('');
  }
}

async function pomoClearHistory() {
  if (!confirm('¿Eliminar todo el historial de sesiones Pomodoro?')) return;
  state.pomodoro.sessionHistory = [];
  state.pomodoro.completedPomodoros = 0;
  state.pomodoro.totalStudySeconds = 0;
  state.pomodoro.subjectStudyTime = {};
  state.pomodoro.weeklyTime = {};
  state.pomodoro.monthlyTime = {};
  await pomoSaveState();
  showToast('Historial eliminado', 'info');
  renderPomodoro();
}

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  // Sign in to Firebase
  await fbSignInAnon();

  // Load all data
  await loadAllData();

  // Render initial page
  navigate('dashboard');

  // IA integrada — no necesita API key
}

init().catch(console.error);
</script>
